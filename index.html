<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>Tic Tac Toe</h1>

    <section class="status-area">
      <div id="status">Current: <span id="currentPlayer">X</span></div>
      <div class="controls">
        <label><input type="checkbox" id="vsCpu"> Play vs CPU</label>
        <button id="restartBtn">Restart Round</button>
        <button id="resetScoresBtn">Reset Scores</button>
      </div>
    </section>

    <section class="board-area">
      <div id="board" class="board">
        <!-- 9 cells -->
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>
    </section>

    <section class="scoreboard">
      <div>Score</div>
      <div class="scores">
        <div>X: <span id="scoreX">0</span></div>
        <div>O: <span id="scoreO">0</span></div>
        <div>Draws: <span id="scoreD">0</span></div>
      </div>
    </section>

    <footer class="attribution">Built with HTML, CSS &amp; JavaScript</footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
